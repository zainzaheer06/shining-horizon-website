<html lang="en">

            <div class="nav-section">Catalog</div>
            <a href="categories.html" class="nav-item"><svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"/></svg>Categories</a>
            <a href="subcategories.html" class="nav-item"><svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z"/></svg>Subcategories</a>
            <a href="products.html" class="nav-item"><svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"/></svg>Products</a>
            <a href="brands.html" class="nav-item"><svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 7h.01M7 3h5c.512 0 1.024.195 1.414.586l7 7a2 2 0 010 2.828l-7 7a2 2 0 01-2.828 0l-7-7A1.994 1.994 0 013 12V7a4 4 0 014-4z"/></svg>Brands</a>
            <div class="nav-section">System</div>
            <a href="users.html" class="nav-item active"><svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z"/></svg>Users</a>
            <a href="#" class="nav-item" onclick="authAPI.logout()"><svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/></svg>Logout</a>
        </nav>
    </aside>
    
    <main class="main-content">
        <header class="header">
            <div class="header-left"><h1 class="header-title">Users</h1></div>
            <div class="header-right">
                <div class="user-menu">
                    <div class="user-avatar">A</div>
                    <div class="user-info"><div class="user-name">Admin</div><div class="user-role">Super Admin</div></div>
                </div>
            </div>
        </header>
        
        <div class="page-content">
            <div class="card">
                <div class="card-header">
                    <h3 class="card-title">Admin Users</h3>
                    <button class="btn btn-primary" onclick="openAddModal()">
                        <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
                        Add User
                    </button>
                </div>
                <div class="card-body">
                    <div id="access-denied" style="display: none; text-align: center; padding: 40px; color: #dc2626;">
                        <svg width="48" height="48" fill="none" stroke="currentColor" viewBox="0 0 24 24" style="margin: 0 auto 16px;">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/>
                        </svg>
                        <h3>Access Denied</h3>
                        <p>Only Super Admins can manage users</p>
                    </div>
                    <div class="table-container" id="users-container">
                        <table>
                            <thead>
                                <tr>
                                    <th>User</th>
                                    <th>Email</th>
                                    <th>Role</th>
                                    <th>Status</th>
                                    <th>Created</th>
                                    <th>Actions</th>
                                </tr>
                            </thead>
                            <tbody id="users-table">
                                <tr><td colspan="6"><div class="loading"><div class="spinner"></div></div></td></tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </main>
    
    <!-- Modal -->
    <div class="modal-overlay" id="user-modal">
        <div class="modal">
            <div class="modal-header">
                <h3 class="modal-title" id="modal-title">Add User</h3>
                <button class="modal-close" onclick="closeModal('user-modal')">
                    <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
                </button>
            </div>
            <form id="user-form" onsubmit="saveUser(event)">
                <div class="modal-body">
                    <input type="hidden" name="id" id="user-id">
                    
                    <div class="form-group">
                        <label class="form-label">Username *</label>
                        <input type="text" name="username" class="form-input" required>
                    </div>
                    
                    <div class="form-group">
                        <label class="form-label">Email *</label>
                        <input type="email" name="email" class="form-input" required>
                    </div>
                    
                    <div class="form-group">
                        <label class="form-label">Full Name</label>
                        <input type="text" name="full_name" class="form-input">
                    </div>
                    
                    <div class="form-group">
                        <label class="form-label">Password <span id="password-hint">(required)</span></label>
                        <input type="password" name="password" class="form-input" id="password-input">
                    </div>
                    
                    <div class="form-group">
                        <label class="form-label">Role *</label>
                        <select name="role" class="form-select" required>
                            <option value="admin">Admin</option>
                            <option value="super_admin">Super Admin</option>
                        </select>
                    </div>
                    
                    <div class="form-group">
                        <label class="form-label"><input type="checkbox" name="is_active" checked> Active</label>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" onclick="closeModal('user-modal')">Cancel</button>
                    <button type="submit" class="btn btn-primary">Save User</button>
                </div>
            </form>
        </div>
    </div>
    
    <div id="toast-container" class="toast-container"></div>
    
    <script src="assets/js/api.js"></script>
    <script src="assets/js/utils.js"></script>
    <script>
        if (!requireAuth()) {}
        
        let users = [];
        let currentUser = null;
        
        document.addEventListener('DOMContentLoaded', async () => {
            initUserInfo();
            currentUser = getCurrentUser();
            
            // Check if super admin
            if (currentUser?.role !== 'super_admin') {
                document.getElementById('users-container').style.display = 'none';
                document.getElementById('access-denied').style.display = 'block';
                document.querySelector('.card-header button').style.display = 'none';
                return;
            }
            
            await loadUsers();
        });
        
        async function loadUsers() {
            try {
                users = await usersAPI.getAll();
                renderUsers();
            } catch (error) {
                if (error.message.includes('403')) {
                    document.getElementById('users-container').style.display = 'none';
                    document.getElementById('access-denied').style.display = 'block';
                } else {
                    showToast(error.message, 'error');
                }
            }
        }
        
        function renderUsers() {
            const tbody = document.getElementById('users-table');
            
            if (users.length === 0) {
                showEmptyState(tbody, 'No users found');
                return;
            }
            
            tbody.innerHTML = users.map(u => `
                <tr>
                    <td>
                        <div style="display: flex; align-items: center; gap: 10px;">
                            <div class="user-avatar" style="width: 32px; height: 32px; font-size: 12px;">${(u.full_name || u.username).charAt(0).toUpperCase()}</div>
                            <div>
                                <strong>${escapeHtml(u.full_name || u.username)}</strong>
                                <br><small style="color: #64748b;">@${escapeHtml(u.username)}</small>
                            </div>
                        </div>
                    </td>
                    <td>${escapeHtml(u.email)}</td>
                    <td><span class="badge ${u.role === 'super_admin' ? 'badge-info' : 'badge-warning'}">${u.role === 'super_admin' ? 'Super Admin' : 'Admin'}</span></td>
                    <td><span class="badge ${u.is_active ? 'badge-success' : 'badge-danger'}">${u.is_active ? 'Active' : 'Inactive'}</span></td>
                    <td>${formatDate(u.created_at)}</td>
                    <td>
                        <div class="table-actions">
                            <button class="btn btn-sm btn-secondary" onclick="editUser(${u.id})">Edit</button>
                            ${u.id !== currentUser.id ? `<button class="btn btn-sm btn-danger" onclick="deleteUser(${u.id})">Delete</button>` : ''}
                        </div>
                    </td>
                </tr>
            `).join('');
        }
        
        function openAddModal() {
            document.getElementById('modal-title').textContent = 'Add User';
            resetForm('user-form');
            document.getElementById('user-id').value = '';
            document.getElementById('password-input').required = true;
            document.getElementById('password-hint').textContent = '(required)';
            openModal('user-modal');
        }
        
        function editUser(id) {
            const u = users.find(user => user.id === id);
            if (!u) return;
            
            document.getElementById('modal-title').textContent = 'Edit User';
            document.getElementById('user-id').value = u.id;
            document.getElementById('password-input').required = false;
            document.getElementById('password-hint').textContent = '(leave blank to keep current)';
            fillForm('user-form', u);
            openModal('user-modal');
        }
        
        async function saveUser(e) {
            e.preventDefault();
            const id = document.getElementById('user-id').value;
            const data = getFormData('user-form');
            delete data.id;
            
            // Remove empty password for updates
            if (id && !data.password) {
                delete data.password;
            }
            
            try {
                if (id) {
                    await usersAPI.update(id, data);
                    showToast('User updated');
                } else {
                    await usersAPI.create(data);
                    showToast('User created');
                }
                closeModal('user-modal');
                await loadUsers();
            } catch (error) {
                showToast(error.message, 'error');
            }
        }
        
        async function deleteUser(id) {
            if (!await confirmDialog('Delete this user?')) return;
            try {
                await usersAPI.delete(id);
                showToast('User deleted');
                await loadUsers();
            } catch (error) {
                showToast(error.message, 'error');
            }
        }
    </script>
</body>
</html>
