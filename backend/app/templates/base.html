<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Shining Horizon Trading{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <link rel="stylesheet" href="components/shared-styles.css">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'primary': '#2d8bc9',
                        'primary-dark': '#1a5a8a',
                        'primary-light': '#5bb5e0',
                    },
                    fontFamily: { 'inter': ['Inter', 'sans-serif'] },
                }
            }
        }
    </script>
    <style>
        * { font-family: 'Inter', sans-serif; }
        .product-card { transition: all 0.3s ease; }
        .product-card:hover { transform: translateY(-5px); box-shadow: 0 20px 40px rgba(45, 139, 201, 0.15); }
    </style>
    {% block extra_styles %}{% endblock %}
</head>
<body class="bg-gray-50 pt-16">
    <div id="header-placeholder"></div>

    {% block content %}{% endblock %}

    <div id="footer-placeholder"></div>
    <script src="components/header.js?v=20241224"></script>
    <script src="components/footer.js?v=20241224"></script>
    <script>AOS.init({ duration: 600, easing: 'ease-out', once: true });</script>
    {% block extra_scripts %}{% endblock %}
</body>
</html>
