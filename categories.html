<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Categories - Shining Horizon Trading</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <link rel="stylesheet" href="components/shared-styles.css">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'primary': '#2d8bc9',
                        'primary-dark': '#1a5a8a',
                        'primary-light': '#5bb5e0',
                        'accent': '#5bb5e0',
                        'accent-light': '#8ed0f0',
                    },
                    fontFamily: { 'inter': ['Inter', 'sans-serif'] },
                }
            }
        }
    </script>
    <style>
        * { font-family: 'Inter', sans-serif; }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: #2d8bc9; border-radius: 4px; }
        html { scroll-behavior: smooth; }
        .btn-primary { transition: all 0.3s ease; }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 10px 30px rgba(0, 136, 204, 0.4); }
        .category-card {
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            flex-direction: column;
        }
        .category-card:hover { transform: translateY(-8px); box-shadow: 0 20px 40px rgba(0, 136, 204, 0.15); }
        .category-card > div:last-child {
            display: flex;
            flex-direction: column;
            flex: 1;
        }
        .category-card > div:last-child > div:last-child {
            margin-top: auto;
        }
    </style>
</head>
<body class="bg-gray-50 pt-16">
    <!-- Header Placeholder -->
    <div id="header-placeholder"></div>

    <!-- Hero Section -->
    <section class="bg-gradient-to-r from-primary to-primary-dark text-white py-16">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 text-center">
            <h1 class="text-4xl md:text-5xl font-bold mb-4" data-aos="fade-up">Product Categories</h1>
            <p class="text-xl text-white/90 max-w-2xl mx-auto" data-aos="fade-up" data-aos-delay="200">
                Explore our comprehensive range of industrial products across multiple categories
            </p>
        </div>
    </section>

    <!-- Categories Grid -->
    <section class="py-20">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div id="categories-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-8">
                <!-- Loaded dynamically from API -->
                <div class="col-span-full flex justify-center py-12">
                    <div class="animate-spin rounded-full h-10 w-10 border-4 border-primary border-t-transparent"></div>
                </div>
            </div>
        </div>
    </section>

    <!-- CTA Section -->
    <section class="bg-primary py-16">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 text-center">
            <h2 class="text-3xl font-bold text-white mb-4">Can't Find What You Need?</h2>
            <p class="text-white/90 text-lg mb-8">We source products globally. Send us your requirements!</p>
            <a href="quote" class="bg-white text-primary font-bold py-4 px-8 rounded-lg hover:bg-gray-100 transition">Request Custom Quote</a>
        </div>
    </section>

    <!-- Footer Placeholder -->
    <div id="footer-placeholder"></div>

    <!-- Load Shared Components -->
    <script src="components/header.js?v=20241224"></script>
    <script src="components/footer.js?v=20241224"></script>

    <script>
        const API_BASE = 'http://localhost:8001';

        function imgUrl(path) {
            if (!path) return null;
            return `${API_BASE}/uploads/${path.replace('backend/uploads/', '')}`;
        }

        async function loadCategories() {
            const grid = document.getElementById('categories-grid');
            try {
                const res = await fetch(`${API_BASE}/categories/public`);
                if (!res.ok) throw new Error('Failed to load');
                const categories = await res.json();

                if (categories.length === 0) {
                    grid.innerHTML = '<p class="col-span-full text-center text-gray-500 py-12">No categories available.</p>';
                    return;
                }

                grid.innerHTML = categories.map((cat, i) => {
                    const img = cat.image
                        ? `<img src="${imgUrl(cat.image)}" alt="${cat.name}" class="w-full h-full object-cover">`
                        : `<div class="w-full h-full bg-gradient-to-br from-primary/20 to-primary/10 flex items-center justify-center">
                               <span class="text-primary text-5xl font-bold">${cat.name.charAt(0)}</span>
                           </div>`;
                    const link = `/category/${cat.slug}`;
                    const count = cat.product_count || 0;
                    return `
                        <div class="category-card bg-white rounded-2xl shadow-lg overflow-hidden" data-aos="fade-up" data-aos-delay="${i * 100}">
                            <div class="h-48 overflow-hidden">${img}</div>
                            <div class="p-6">
                                <h3 class="text-xl font-bold text-gray-900 mb-2">${cat.name}</h3>
                                <p class="text-gray-600 text-sm mb-4">${cat.description || ''}</p>
                                <div class="flex items-center justify-between">
                                    ${count > 0 ? `<span class="text-primary font-semibold text-sm">${count}+ Products</span>` : '<span></span>'}
                                    <a href="${link}" class="bg-primary text-white px-4 py-2 rounded-lg text-sm font-medium hover:bg-primary-dark transition">View Details</a>
                                </div>
                            </div>
                        </div>`;
                }).join('');

                AOS.init({ duration: 800, easing: 'ease-out', once: true });

            } catch (err) {
                grid.innerHTML = '<p class="col-span-full text-center text-red-500 py-12">Could not load categories. Make sure the backend server is running.</p>';
            }
        }

        loadCategories();
    </script>
</body>
</html>
